name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Node.js dependencies
      run: npm install

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r jarvis/requirements.txt
        pip install pytest flake8 black

    - name: Run JS Lint
      run: npm run lint

    - name: Run Python Lint
      run: flake8 jarvis tests --max-line-length=120 --exclude=__pycache__,.venv

    - name: Run Python Tests
      run: pytest tests/

    - name: Build Electron App (Smoke Test)
      run: npm run build
